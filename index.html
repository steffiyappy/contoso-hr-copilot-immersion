<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>Contoso HR Copilot Immersion</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            /* ── Theme variables ── */
            :root { --contoso: #10b981; }

            @media (prefers-color-scheme: dark) {
                :root {
                    --bg: #0b1020;
                    --panel: #0e1633;
                    --ink: #e2e8f0;
                    --muted: #94a3b8;
                    --border: #1e2d4a;
                    --input-bg: #0a0f24;
                    --danger: #ef4444;
                }
            }

            @media (prefers-color-scheme: light) {
                :root {
                    --bg: #f0f4f8;
                    --panel: #ffffff;
                    --ink: #1a202c;
                    --muted: #64748b;
                    --border: #d1d9e6;
                    --input-bg: #eef2f7;
                    --danger: #dc2626;
                }
            }

            /* ── Base ── */
            *, *::before, *::after { box-sizing: border-box; }

            .staticrypt-html, .staticrypt-body {
                height: 100%;
                margin: 0;
            }

            /* ── Full-screen lock screen ── */
            .staticrypt-content {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: "Inter", "Segoe UI", system-ui, sans-serif;
                -webkit-font-smoothing: antialiased;
                background: radial-gradient(ellipse at 30% 40%, rgba(0, 80, 60, 0.45), transparent 60%), var(--bg);
            }

            /* ── Spinner ── */
            .staticrypt-spinner-container {
                position: fixed;
                inset: 0;
                background: #0b1020;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 0.25em solid #334155;
                border-right-color: var(--contoso);
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            /* ── Card wrapper ── */
            .staticrypt-page {
                width: 100%;
                max-width: 440px;
                padding: 0 20px;
            }

            .staticrypt-form {
                background: var(--panel);
                border: 1px solid var(--border);
                border-radius: 20px;
                padding: 40px 44px;
                text-align: center;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            }

            /* ── Logo icon ── */
            .staticrypt-logo {
                width: 56px;
                height: 56px;
                border-radius: 14px;
                background: var(--contoso);
                display: grid;
                place-items: center;
                font-weight: 900;
                font-size: 14px;
                letter-spacing: -0.5px;
                color: #fff;
                margin: 0 auto 18px;
            }

            /* ── Title & instructions ── */
            .staticrypt-title {
                font-size: 20px;
                font-weight: 700;
                color: var(--ink);
                margin: 0 0 6px;
            }

            .staticrypt-instructions {
                color: var(--muted);
                font-size: 14px;
                margin: 0 0 20px;
            }

            .staticrypt-instructions p {
                margin: 4px 0;
            }

            /* ── Divider ── */
            .staticrypt-hr {
                border: 0;
                border-top: 1px solid var(--border);
                margin: 0 0 20px;
            }

            /* ── Password input ── */
            .staticrypt-password-container {
                position: relative;
                margin-bottom: 12px;
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                width: 100%;
                background: var(--input-bg);
                border: 1px solid var(--border);
                border-radius: 10px;
                color: var(--ink);
                font-size: 15px;
                padding: 12px 44px 12px 16px;
                outline: none;
                font-family: inherit;
                transition: border-color 0.2s;
            }

            .staticrypt-form input[type="password"]:focus,
            .staticrypt-form input[type="text"]:focus {
                border-color: var(--contoso);
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                width: 18px;
                opacity: 40%;
                position: absolute;
                right: 14px;
                top: 50%;
                transform: translateY(-50%);
                padding: 0;
            }

            @media (prefers-color-scheme: dark) {
                .staticrypt-toggle-password-visibility {
                    filter: invert(1);
                    opacity: 55%;
                }
            }

            /* ── Submit button ── */
            .staticrypt-form .staticrypt-decrypt-button {
                width: 100%;
                background: var(--contoso);
                color: #fff;
                border: none;
                border-radius: 10px;
                font-size: 15px;
                font-weight: 700;
                padding: 13px;
                cursor: pointer;
                font-family: inherit;
                transition: filter 0.2s;
                margin-top: 4px;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                filter: brightness(90%);
            }

            /* ── Remember me ── */
            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 12px;
                font-size: 14px;
                color: var(--muted);
                text-align: left;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.5);
                margin-right: 10px;
            }

            /* ── Utility ── */
            .hidden { display: none !important; }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] {
                    font-size: 16px;
                }
            }
        </style>
    </head>
